{{- if .Values.networkPolicy.enable }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "k8s-gcp-cert-injector.resourceName" (dict "suffix" "controller-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ include "k8s-gcp-cert-injector.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "k8s-gcp-cert-injector.name" . }}
      control-plane: controller-manager
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow health probes on port 8081
  - ports:
    - protocol: TCP
      port: 8081
  {{- if .Values.metrics.enable }}
  # Allow scraping metrics on metrics port
  - ports:
    - protocol: TCP
      port: {{ .Values.metrics.port }}
  {{- end }}
  egress:
  # Allow DNS resolution (port 53 UDP and TCP) to any destination
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow HTTPS egress (port 443 TCP) to reach K8s API server and GCP Certificate Manager API
  - ports:
    - protocol: TCP
      port: 443
{{- end }}
